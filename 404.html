<!DOCTYPE html>
<html lang="en">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'playful-mint': '#a7f3d0',
                        'playful-coral': '#fda4af',
                        'playful-yellow': '#fef08a',
                        'playful-blue': '#bfdbfe',
                        'playful-dark': '#334155',
                        'playful-bg': '#fffbf0',
                    },
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        display: ['Fredoka One', 'cursive'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">

<body class="bg-playful-bg text-playful-dark font-sans min-h-screen flex flex-col justify-between items-center relative overflow-hidden selection:bg-playful-coral selection:text-white px-4">

    <!-- Decorative background blobs -->

    </div>
    <div
        class="absolute bottom-0 right-0 w-[300px] h-[300px] md:w-[500px] md:h-[500px] bg-playful-yellow/30 rounded-full blur-3xl translate-x-1/3 translate-y-1/3 -z-10 pointer-events-none">

    <main class="text-center max-w-lg z-10 my-auto py-12">
        <div class="relative inline-block mb-8">
            <div class="text-[120px] sm:text-[150px] font-display text-playful-coral leading-none select-none drop-shadow-[4px_4px_0px_rgba(51,65,85,1)]">

        <p class="text-lg font-bold text-gray-500 mb-10 leading-relaxed">

        </p>

        <div>
            <a href="./index.html"

    <!-- Footer -->
